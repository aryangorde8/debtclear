name: CI/CD · Deploy to EC2

# Auto-deploy on every push to main. Also runnable on demand from the
# Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two production deploys overlap.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── Gate: don't deploy a broken build ──────────────────────────────────────
  check:
    name: Django check
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-only-not-secret
      DJANGO_DEBUG: "False"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Django system checks
        run: python manage.py check
      - name: Collect static (build sanity)
        run: python manage.py collectstatic --noinput

  # ── Deploy: SSH into EC2, pull the new commit, restart gunicorn ────────────
  deploy:
    name: Deploy to production
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}        # public IP or DNS of the box
          EC2_USER: ${{ secrets.EC2_USER }}        # e.g. ubuntu or ec2-user
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}  # PRIVATE key for the deploy user
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}  # optional, default: debtclear
          APP_DIR: ${{ secrets.APP_DIR }}            # optional, default: /home/ubuntu/debtclear
        run: |
          set -euo pipefail
          APP_DIR="${APP_DIR:-/home/ubuntu/debtclear}"
          SERVICE="${SERVICE_NAME:-debtclear}"

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "Deploying to $EC2_USER@$EC2_HOST:$APP_DIR (service: $SERVICE)"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$EC2_USER@$EC2_HOST" \
            "set -e; cd '$APP_DIR'; git fetch --all --prune; git reset --hard origin/main; SERVICE='$SERVICE' bash deploy/remote_deploy.sh"
