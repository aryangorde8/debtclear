# /etc/nginx/sites-available/debtclear  (symlink into sites-enabled)
#
# Reference nginx reverse-proxy for DebtClear. Gunicorn listens on
# 127.0.0.1:8002; WhiteNoise serves static files from inside Django, so no
# separate /static/ location is required.
#
# After editing:
#   sudo ln -sf /etc/nginx/sites-available/debtclear /etc/nginx/sites-enabled/debtclear
#   sudo nginx -t && sudo systemctl reload nginx
# Then add HTTPS with: sudo certbot --nginx -d debtclear.aryangorde.com

server {
    listen 80;
    listen [::]:80;
    server_name debtclear.aryangorde.com;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
